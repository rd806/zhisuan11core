name: zhisuan11core
version: '1.2'
main: org.rd806.zhisuan11.Zhisuan11core
api-version: '1.20'
authors: [RunicDolphin806]

# 插件指令名
commands:
    zhisuan11:
        description: "基础指令"
        permission: Zhisuan11.main
        aliases: zs
    tp:
        description: "传送指令"
        permission: Zhisuan11.tp
        aliases: [teleport]

# 权限设置
permissions:
    Zhisuan11.main:
        description: 允许使用基础命令
        default: true
    Zhisuan11.tp:
        description: 允许使用基础传送指令
        default: false
